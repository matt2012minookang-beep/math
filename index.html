<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>방정식 계산 사이트</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/nerdamer.core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Algebra.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Calculus.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Solve.js"></script>

  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#1e293b;
      --panel:#111827d8;
      --line:#334155;
      --text:#e5eefc;
      --sub:#9fb0cc;
      --accent:#60a5fa;
      --accent2:#22c55e;
      --danger:#f87171;
      --shadow:0 20px 60px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #1d4ed8 0%, transparent 28%),
        radial-gradient(circle at top right, #0ea5e9 0%, transparent 24%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      padding:14px;
    }
    .wrap{
      width:min(1200px, 100%);
      margin:0 auto;
      background:var(--panel);
      backdrop-filter: blur(14px);
      border:1px solid rgba(255,255,255,.09);
      border-radius:26px;
      box-shadow:var(--shadow);
      padding:20px;
    }
    .title{
      margin:0 0 8px;
      font-size:clamp(28px, 4vw, 42px);
      font-weight:900;
      letter-spacing:-0.03em;
    }
    .only-help{
      color:var(--sub);
      font-size:15px;
      line-height:1.7;
      margin-bottom:14px;
    }

    .layout{
      display:grid;
      grid-template-columns: 1.45fr 0.85fr;
      gap:16px;
      align-items:start;
    }

    .card{
      background:rgba(2,8,23,.55);
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px;
    }

    .analysis-grid{
      display:grid;
      gap:12px;
    }
    .mini{
      background:#0b1220;
      border:1px solid #334155;
      border-radius:16px;
      padding:14px;
    }
    .mini-label{
      color:var(--sub);
      font-size:13px;
      font-weight:800;
      margin-bottom:8px;
    }
    .mini-value{
      font-size:15px;
      line-height:1.7;
      color:#e2e8f0;
      word-break:break-word;
    }

    .equation-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .eq-row{
      position:relative;
      background:#0b1220;
      border:1px solid #334155;
      border-radius:18px;
      padding:12px;
    }
    .eq-inputs{
      display:grid;
      grid-template-columns:1fr auto 1fr auto;
      gap:10px;
      align-items:center;
    }
    .field{
      width:100%;
      min-height:58px;
      border-radius:14px;
      border:1px solid #3b4a64;
      background:#09111f;
      color:var(--text);
      padding:14px 16px;
      font-size:22px;
      font-weight:700;
      outline:none;
      transition:.18s ease;
    }
    .field:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(96,165,250,.14);
    }
    .field::placeholder{
      color:#7f8da5;
      font-weight:600;
    }
    .relation-wrap{ position:relative; }
    .relation-btn{
      min-width:78px;
      height:52px;
      border:none;
      border-radius:12px;
      background:#172133;
      color:#dbeafe;
      font-size:24px;
      font-weight:900;
      border:1px solid #334155;
      cursor:pointer;
    }
    .relation-btn:hover{
      background:#1d2b42;
      transform:translateY(-1px);
    }
    .relation-menu{
      position:absolute;
      top:62px;
      left:50%;
      transform:translateX(-50%);
      z-index:30;
      display:none;
      grid-template-columns:repeat(3, 1fr);
      gap:8px;
      background:#0f172a;
      border:1px solid #334155;
      border-radius:14px;
      padding:10px;
      box-shadow:0 18px 40px rgba(0,0,0,.35);
      min-width:220px;
    }
    .relation-menu.show{ display:grid; }
    .relation-item{
      height:42px;
      border:none;
      border-radius:10px;
      background:#172133;
      color:#e5eefc;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      border:1px solid #334155;
    }
    .relation-item:hover{ background:#1d2b42; }

    .remove-btn{
      border:none;
      cursor:pointer;
      background:#3b1020;
      color:#fecdd3;
      font-weight:900;
      font-size:18px;
      width:46px;
      height:46px;
      border-radius:12px;
      transition:.18s ease;
      flex-shrink:0;
    }
    .remove-btn:hover{
      filter:brightness(1.08);
      transform:translateY(-1px);
    }

    .eq-preview{
      margin-top:12px;
      min-height:64px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      overflow:auto hidden;
      background:rgba(15,23,42,.55);
      border:1px solid rgba(148,163,184,.16);
      border-radius:14px;
      padding:10px;
      font-size:24px;
    }

    .toolbar{
      margin-top:12px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .tool-btn{
      min-width:58px;
      height:44px;
      border:none;
      border-radius:12px;
      background:#172133;
      color:#e5eefc;
      font-size:17px;
      font-weight:900;
      cursor:pointer;
      border:1px solid #334155;
      transition:.16s ease;
      padding:0 10px;
    }
    .tool-btn:hover{
      transform:translateY(-1px);
      background:#1d2b42;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    button{
      border:none;
      cursor:pointer;
      border-radius:14px;
      padding:14px 18px;
      font-size:16px;
      font-weight:900;
      transition:.18s ease;
    }
    button:hover{ transform:translateY(-1px); }
    .btn-main{
      background:linear-gradient(135deg, var(--accent), #2563eb);
      color:white;
      box-shadow:0 12px 30px rgba(37,99,235,.25);
    }
    .btn-sub{
      background:#1f2937;
      color:#e5e7eb;
      border:1px solid #3b4455;
    }
    .btn-green{
      background:linear-gradient(135deg, #22c55e, #16a34a);
      color:#fff;
      box-shadow:0 12px 28px rgba(34,197,94,.22);
    }

    .warning{
      min-height:20px;
      color:#fecaca;
      font-size:13px;
      font-weight:800;
      margin-top:8px;
    }

    .inline-result{
      margin-top:14px;
      background:rgba(2,8,23,.82);
      border:1px solid #334155;
      border-radius:18px;
      padding:16px;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(34,197,94,.12);
      border:1px solid rgba(34,197,94,.25);
      color:#bbf7d0;
      font-size:13px;
      font-weight:900;
      margin-bottom:10px;
    }
    .result-title{
      margin:0 0 10px;
      font-size:20px;
      font-weight:900;
    }
    .result-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .result-item{
      background:#0b1220;
      border:1px solid #334155;
      border-radius:16px;
      padding:14px 16px;
      overflow:auto hidden;
    }
    .msg{
      font-size:16px;
      line-height:1.7;
      color:#e2e8f0;
    }
    .msg.error{ color:#fecaca; }

    @media (max-width: 980px){
      .layout{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 720px){
      body{ padding:10px; }
      .wrap{
        padding:14px;
        border-radius:20px;
      }
      .eq-inputs{
        grid-template-columns:1fr;
        gap:8px;
      }
      .field{
        min-height:54px;
        font-size:19px;
        padding:12px 14px;
      }
      .relation-btn{
        width:100%;
        height:50px;
        font-size:22px;
      }
      .relation-menu{
        left:50%;
        transform:translateX(-50%);
        min-width:260px;
      }
      .remove-btn{
        width:100%;
        height:48px;
      }
      .toolbar{ gap:6px; }
      .tool-btn{
        min-width:calc(25% - 5px);
        height:46px;
        font-size:16px;
      }
      .controls{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:8px;
      }
      .controls button{
        width:100%;
        min-height:48px;
        padding:12px 10px;
        font-size:15px;
      }
      .controls button:first-child{
        grid-column:1 / -1;
      }
      .eq-preview{
        min-height:58px;
        font-size:20px;
        padding:8px;
      }
      .inline-result{ padding:14px; }
      .result-item{ padding:12px 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">방정식 계산 사이트</h1>
    <div class="only-help">가운데를 눌러 등호와 부등호를 바꿔보세요!</div>

    <div class="layout">
      <div class="card">
        <div id="equationList" class="equation-list"></div>

        <div class="controls">
          <button id="addEqBtn" class="btn-green">식 추가</button>
          <button id="solveBtn" class="btn-main">해 찾기</button>
          <button id="clearBtn" class="btn-sub">모두 지우기</button>
        </div>

        <div id="warning" class="warning"></div>

        <div class="inline-result">
          <div class="chip">결과</div>
          <div class="result-title">해 / 판정</div>
          <div id="resultList" class="result-list">
            <div class="msg">아직 계산하지 않았어.</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="analysis-grid">
          <div class="mini">
            <div class="mini-label">식 개수</div>
            <div id="analysisCount" class="mini-value">0</div>
          </div>
          <div class="mini">
            <div class="mini-label">감지된 미지수</div>
            <div id="analysisVars" class="mini-value">없음</div>
          </div>
          <div class="mini">
            <div class="mini-label">식 종류</div>
            <div id="analysisMode" class="mini-value">입력 대기 중</div>
          </div>
          <div class="mini">
            <div class="mini-label">현재 관계</div>
            <div id="analysisRelations" class="mini-value">없음</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const equationList = document.getElementById('equationList');
    const addEqBtn = document.getElementById('addEqBtn');
    const solveBtn = document.getElementById('solveBtn');
    const clearBtn = document.getElementById('clearBtn');
    const warning = document.getElementById('warning');
    const resultList = document.getElementById('resultList');

    const analysisCount = document.getElementById('analysisCount');
    const analysisVars = document.getElementById('analysisVars');
    const analysisMode = document.getElementById('analysisMode');
    const analysisRelations = document.getElementById('analysisRelations');

    const MAX_EQUATIONS = 8;
    const RELATIONS = ['=', '>', '<', '>=', '<='];

    const KOR_TO_ENG = {
      'ㅂ':'q','ㅈ':'w','ㄷ':'e','ㄱ':'r','ㅅ':'t','ㅛ':'y','ㅕ':'u','ㅑ':'i','ㅐ':'o','ㅔ':'p',
      'ㅁ':'a','ㄴ':'s','ㅇ':'d','ㄹ':'f','ㅎ':'g','ㅗ':'h','ㅓ':'j','ㅏ':'k','ㅣ':'l',
      'ㅋ':'z','ㅌ':'x','ㅊ':'c','ㅍ':'v','ㅠ':'b','ㅜ':'n','ㅡ':'m',
      'ㅃ':'Q','ㅉ':'W','ㄸ':'E','ㄲ':'R','ㅆ':'T','ㅒ':'O','ㅖ':'P'
    };

    const ALLOWED_REGEX = /[^0-9a-zA-Z+\-*/^().,_ =<>√!π]/g;

    const EXACT_TRIG = {
      sin: {
        0:'0',30:'1/2',45:'sqrt(2)/2',60:'sqrt(3)/2',90:'1',
        120:'sqrt(3)/2',135:'sqrt(2)/2',150:'1/2',180:'0',
        210:'-1/2',225:'-sqrt(2)/2',240:'-sqrt(3)/2',270:'-1',
        300:'-sqrt(3)/2',315:'-sqrt(2)/2',330:'-1/2',360:'0'
      },
      cos: {
        0:'1',30:'sqrt(3)/2',45:'sqrt(2)/2',60:'1/2',90:'0',
        120:'-1/2',135:'-sqrt(2)/2',150:'-sqrt(3)/2',180:'-1',
        210:'-sqrt(3)/2',225:'-sqrt(2)/2',240:'-1/2',270:'0',
        300:'1/2',315:'sqrt(2)/2',330:'sqrt(3)/2',360:'1'
      },
      tan: {
        0:'0',30:'sqrt(3)/3',45:'1',60:'sqrt(3)',
        120:'-sqrt(3)',135:'-1',150:'-sqrt(3)/3',180:'0',
        210:'sqrt(3)/3',225:'1',240:'sqrt(3)',
        300:'-sqrt(3)',315:'-1',330:'-sqrt(3)/3',360:'0'
      }
    };

    function showWarning(text=''){
      warning.textContent = text;
    }

    function convertKoreanKeyboardToEnglish(value){
      let out = '';
      for(const ch of value){
        out += KOR_TO_ENG[ch] !== undefined ? KOR_TO_ENG[ch] : ch;
      }
      return out;
    }

    function sanitizeInput(value){
      let v = convertKoreanKeyboardToEnglish(value);
      v = v.replace(/×/g, '*').replace(/÷/g, '/');
      v = v.replace(ALLOWED_REGEX, '');
      return v;
    }

    function normalizeAngleDeg(n){
      let a = Number(n);
      if (!Number.isFinite(a)) return null;
      a = ((a % 360) + 360) % 360;
      if (Math.abs(a - Math.round(a)) < 1e-10) a = Math.round(a);
      return a;
    }

    function replaceExactTrig(expr){
      let s = expr;
      for (const fn of ['sin', 'cos', 'tan']) {
        s = s.replace(new RegExp(fn + '\\(([-+]?\\d+(?:\\.\\d+)?)\\)', 'g'), (m, angleStr) => {
          const ang = normalizeAngleDeg(angleStr);
          if (ang === null) return m;
          const exact = EXACT_TRIG[fn][String(ang)];
          return exact !== undefined ? '(' + exact + ')' : m;
        });
      }
      return s;
    }

    function isAlphaNum(ch){
      return /[a-zA-Z0-9.π]/.test(ch);
    }

    function findMatchingParen(text, startIndex){
      let depth = 0;
      for(let i = startIndex; i < text.length; i++){
        if(text[i] === '(') depth++;
        else if(text[i] === ')'){
          depth--;
          if(depth === 0) return i;
        }
      }
      return -1;
    }

    function replaceScientificE(expr){
      return expr.replace(/(\d+(?:\.\d+)?)E([+\-]?\d+(?:\.\d+)?)/g, '($1*10^($2))');
    }

    function replaceConstants(expr){
      return expr.replace(/π/g, 'pi');
    }

    function replaceLogFunctions(expr){
      let s = expr;
      s = s.replace(/\bln\s*\(/g, 'log(');
      s = s.replace(/\blog\s*\(/g, 'LOG10(');
      s = s.replace(/\bLOG10\s*\(([^()]*)\)/g, '(log($1)/log(10))');
      return s;
    }

    function convertRootsToPowers(expr){
      let s = expr;

      while(s.includes('√(')){
        let idx = s.indexOf('√(');
        let start = idx + 1;
        let end = findMatchingParen(s, start);
        if(end === -1) break;
        const inside = s.slice(start + 1, end);
        s = s.slice(0, idx) + '((' + inside + ')^(1/2))' + s.slice(end + 1);
      }

      let changed = true;
      while(changed){
        changed = false;
        let result = '';
        for(let i = 0; i < s.length; i++){
          if(s[i] === '√'){
            const next = s[i + 1];
            if(next && isAlphaNum(next)){
              result += '((' + next + ')^(1/2))';
              i += 1;
              changed = true;
            } else {
              result += s[i];
            }
          } else {
            result += s[i];
          }
        }
        s = result;
      }

      return s;
    }

    function convertFactorial(expr){
      let s = expr;

      function readLeftToken(str, endIndex){
        let i = endIndex;
        if(i < 0) return null;

        if(str[i] === ')'){
          let depth = 1;
          i--;
          while(i >= 0){
            if(str[i] === ')') depth++;
            else if(str[i] === '(') depth--;
            if(depth === 0) return { start:i, token:str.slice(i, endIndex+1) };
            i--;
          }
          return null;
        }

        while(i >= 0 && /[a-zA-Z0-9._π]/.test(str[i])) i--;
        return { start:i+1, token:str.slice(i+1, endIndex+1) };
      }

      while(s.includes('!')){
        const idx = s.indexOf('!');
        const left = readLeftToken(s, idx-1);
        if(!left || !left.token) break;
        s = s.slice(0, left.start) + 'factorial(' + left.token + ')' + s.slice(idx+1);
      }

      return s;
    }

    function convertTrigToDegrees(expr){
      let s = expr;
      const funcs = ['sin', 'cos', 'tan'];

      function replaceFunction(funcName, text){
        let i = 0;
        let out = '';

        while(i < text.length){
          const target = funcName + '(';
          if(text.slice(i, i + target.length) === target){
            const openIndex = i + funcName.length;
            const end = findMatchingParen(text, openIndex);
            if(end === -1){
              out += text[i];
              i++;
              continue;
            }
            const inside = text.slice(openIndex + 1, end);
            out += funcName + '((' + inside + ')*pi/180)';
            i = end + 1;
          } else {
            out += text[i];
            i++;
          }
        }

        return out;
      }

      funcs.forEach(fn => {
        s = replaceFunction(fn, s);
      });

      return s;
    }

    function normalizeExpr(expr){
      let s = expr.trim();
      s = s.replace(/\s+/g, '');
      s = s.replace(/×/g, '*').replace(/÷/g, '/');
      s = replaceScientificE(s);
      s = replaceExactTrig(s);
      s = replaceConstants(s);
      s = convertRootsToPowers(s);
      s = convertFactorial(s);
      s = replaceLogFunctions(s);
      s = convertTrigToDegrees(s);
      return s;
    }

    function relationToLatex(rel){
      if(rel === '>=') return '\\ge';
      if(rel === '<=') return '\\le';
      if(rel === '>') return '>';
      if(rel === '<') return '<';
      return '=';
    }

    function renderLatex(el, latex){
      try{
        katex.render(latex, el, {
          throwOnError:false,
          displayMode:true,
          trust:true
        });
      }catch(e){
        el.textContent = latex;
      }
    }

    function toDisplayLatexInput(expr){
      const cleaned = expr.trim();
      if(!cleaned) return '\\square';

      try{
        let latexSrc = cleaned
          .replace(/√\(([^()]*)\)/g, 'sqrt($1)')
          .replace(/√([a-zA-Z0-9.π]+)/g, 'sqrt($1)')
          .replace(/π/g, 'pi');
        latexSrc = replaceExactTrig(latexSrc);
        return nerdamer.convertToLaTeX(latexSrc);
      }catch(e){
        try{
          return nerdamer.convertToLaTeX(normalizeExpr(cleaned));
        }catch(e2){
          return cleaned;
        }
      }
    }

    function closeAllRelationMenus(){
      document.querySelectorAll('.relation-menu').forEach(menu => menu.classList.remove('show'));
    }

    function updatePreviewForRow(row){
      const left = row.querySelector('.left-input').value.trim();
      const right = row.querySelector('.right-input').value.trim();
      const preview = row.querySelector('.eq-preview');
      const relation = row.dataset.relation || '=';

      const leftLatex = toDisplayLatexInput(left);
      const rightLatex = toDisplayLatexInput(right);

      renderLatex(preview, `${leftLatex} ${relationToLatex(relation)} ${rightLatex}`);
    }

    function setActiveSide(row, side){
      row.dataset.activeSide = side;
    }

    function insertAtCursor(input, text, cursorOffset = null){
      input.focus();
      const start = input.selectionStart ?? input.value.length;
      const end = input.selectionEnd ?? input.value.length;
      input.value = input.value.slice(0, start) + text + input.value.slice(end);
      const newPos = cursorOffset === null ? start + text.length : start + cursorOffset;
      input.setSelectionRange(newPos, newPos);
      input.dispatchEvent(new Event('input'));
    }

    function createToolbar(row, leftInput, rightInput){
      const toolbar = document.createElement('div');
      toolbar.className = 'toolbar';

      const buttons = [
        { label:'+', insert:'+' },
        { label:'-', insert:'-' },
        { label:'×', insert:'*' },
        { label:'÷', insert:'/' },
        { label:'^', insert:'^' },
        { label:'(', insert:'(' },
        { label:')', insert:')' },
        { label:'√', insert:'√' },
        { label:'π', insert:'π' },
        { label:'.', insert:'.' },
        { label:'log', insert:'log()', cursor:4 },
        { label:'ln', insert:'ln()', cursor:3 },
        { label:'e', insert:'e' },
        { label:'E', insert:'E' },
        { label:'!', insert:'!' },
        { label:'sin', insert:'sin()', cursor:4 },
        { label:'cos', insert:'cos()', cursor:4 },
        { label:'tan', insert:'tan()', cursor:4 }
      ];

      buttons.forEach(btnInfo => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tool-btn';
        btn.textContent = btnInfo.label;

        btn.addEventListener('click', () => {
          const activeSide = row.dataset.activeSide || 'left';
          const target = activeSide === 'right' ? rightInput : leftInput;
          insertAtCursor(target, btnInfo.insert, btnInfo.cursor ?? null);
        });

        toolbar.appendChild(btn);
      });

      row.appendChild(toolbar);
    }

    function createRelationPicker(row, relationBtn){
      const menu = document.createElement('div');
      menu.className = 'relation-menu';

      RELATIONS.forEach(rel => {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = 'relation-item';
        item.textContent = rel;

        item.addEventListener('click', () => {
          row.dataset.relation = rel;
          relationBtn.textContent = rel;
          menu.classList.remove('show');
          updatePreviewForRow(row);
          updateAnalysis();
        });

        menu.appendChild(item);
      });

      relationBtn.parentElement.appendChild(menu);

      relationBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const willOpen = !menu.classList.contains('show');
        closeAllRelationMenus();
        if(willOpen) menu.classList.add('show');
      });
    }

    function createEquationRow(leftValue='', rightValue='', relation='='){
      const rowCount = equationList.querySelectorAll('.eq-row').length;
      if(rowCount >= MAX_EQUATIONS){
        showWarning(`식은 최대 ${MAX_EQUATIONS}개까지 추가할 수 있어.`);
        return;
      }

      const row = document.createElement('div');
      row.className = 'eq-row';
      row.dataset.relation = relation;
      row.dataset.activeSide = 'left';

      row.innerHTML = `
        <div class="eq-inputs">
          <input class="field left-input" type="text" autocomplete="off" spellcheck="false" placeholder="왼쪽 식 입력" value="">
          <div class="relation-wrap">
            <button class="relation-btn" type="button">${relation}</button>
          </div>
          <input class="field right-input" type="text" autocomplete="off" spellcheck="false" placeholder="오른쪽 식 입력" value="">
          <button class="remove-btn" type="button">×</button>
        </div>
        <div class="eq-preview">\\square = \\square</div>
      `;

      equationList.appendChild(row);

      const leftInput = row.querySelector('.left-input');
      const rightInput = row.querySelector('.right-input');
      const relationBtn = row.querySelector('.relation-btn');
      const removeBtn = row.querySelector('.remove-btn');

      leftInput.value = leftValue;
      rightInput.value = rightValue;

      createRelationPicker(row, relationBtn);
      createToolbar(row, leftInput, rightInput);
      setActiveSide(row, 'left');

      function onInput(e){
        const before = e.target.value;
        const after = sanitizeInput(before);

        if(before !== after){
          e.target.value = after;
          showWarning('한글 자판 입력은 자동으로 영문으로 바꾸고, 허용되지 않은 문자는 제거했어.');
        }else{
          showWarning('');
        }

        setActiveSide(row, e.target === rightInput ? 'right' : 'left');
        updatePreviewForRow(row);
        updateAnalysis();
      }

      function onFocus(e){
        setActiveSide(row, e.target === rightInput ? 'right' : 'left');
      }

      function onPaste(input, e){
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text');
        const sanitized = sanitizeInput(pasted);
        const start = input.selectionStart ?? input.value.length;
        const end = input.selectionEnd ?? input.value.length;
        input.value = input.value.slice(0, start) + sanitized + input.value.slice(end);
        input.dispatchEvent(new Event('input'));
      }

      [leftInput, rightInput].forEach(input => {
        input.addEventListener('input', onInput);
        input.addEventListener('focus', onFocus);
        input.addEventListener('click', onFocus);
        input.addEventListener('paste', e => onPaste(input, e));
        input.addEventListener('keydown', e => {
          if(e.key === 'Enter') solveAll();
        });
      });

      removeBtn.addEventListener('click', () => {
        const count = equationList.querySelectorAll('.eq-row').length;
        if(count <= 1){
          leftInput.value = '';
          rightInput.value = '';
          row.dataset.relation = '=';
          relationBtn.textContent = '=';
          setActiveSide(row, 'left');
          updatePreviewForRow(row);
          updateAnalysis();
          return;
        }
        row.remove();
        updateAnalysis();
      });

      updatePreviewForRow(row);
      updateAnalysis();
    }

    function getRows(){
      return [...equationList.querySelectorAll('.eq-row')];
    }

    function getEquationObjects(){
      return getRows().map(row => {
        const leftInput = row.querySelector('.left-input');
        const rightInput = row.querySelector('.right-input');
        const relation = row.dataset.relation || '=';

        const leftDisplay = leftInput.value.trim();
        const rightDisplay = rightInput.value.trim();

        return {
          row,
          relation,
          leftDisplay,
          rightDisplay,
          left: normalizeExpr(leftDisplay),
          right: normalizeExpr(rightDisplay)
        };
      }).filter(item => item.leftDisplay || item.rightDisplay);
    }

    function detectVariablesFromText(text){
      const raw = text.match(/[a-zA-Z]+/g) || [];
      const banned = new Set(['e', 'pi', 'sin', 'cos', 'tan', 'log', 'ln', 'factorial', 'sqrt']);
      return [...new Set(raw.filter(v => !banned.has(v.toLowerCase())))];
    }

    function updateAnalysis(){
      const equations = getEquationObjects();
      analysisCount.textContent = String(equations.length);

      if(!equations.length){
        analysisVars.textContent = '없음';
        analysisMode.textContent = '입력 대기 중';
        analysisRelations.textContent = '없음';
        return;
      }

      const text = equations.map(e => `${e.left}${e.relation}${e.right}`).join(' ');
      const vars = detectVariablesFromText(text);
      analysisVars.textContent = vars.length ? vars.join(', ') : '없음';

      const relations = [...new Set(equations.map(e => e.relation))];
      analysisRelations.textContent = relations.join(', ');

      const hasIneq = equations.some(e => e.relation !== '=');

      if(hasIneq){
        if(equations.length === 1 && vars.length <= 1){
          analysisMode.textContent = '부등식';
        } else {
          analysisMode.textContent = '복합식';
        }
        return;
      }

      if(vars.length === 0){
        analysisMode.textContent = '수치 비교';
      } else if(equations.length === 1 && vars.length === 1){
        analysisMode.textContent = '단일 미지수 방정식';
      } else if(equations.length >= 2){
        analysisMode.textContent = '연립방정식';
      } else {
        analysisMode.textContent = '식 분석 중';
      }
    }

    function clearResults(){
      resultList.innerHTML = '';
    }

    function addMessage(text, isError=false){
      const div = document.createElement('div');
      div.className = 'msg' + (isError ? ' error' : '');
      div.textContent = text;
      resultList.appendChild(div);
    }

    function addLatexResult(latex){
      const item = document.createElement('div');
      item.className = 'result-item';
      renderLatex(item, latex);
      resultList.appendChild(item);
    }

    function formatApprox(expr){
      try{
        const approx = nerdamer(String(expr)).evaluate().text();
        const num = Number(approx);
        if (Number.isFinite(num)) {
          return num.toFixed(12).replace(/\.?0+$/, '');
        }
        return approx;
      } catch {
        return null;
      }
    }

    function addExactApproxResult(varName, exactExpr){
      let exactLatex;
      try{
        exactLatex = `${varName} = ${nerdamer.convertToLaTeX(String(exactExpr))}`;
      }catch(e){
        exactLatex = `${varName} = ${String(exactExpr)}`;
      }
      addLatexResult(exactLatex);

      const approx = formatApprox(exactExpr);
      if(approx !== null){
        addLatexResult(`\\text{근사값}\\; ${varName} \\approx ${approx}`);
      }
    }

    function getSolutionsStringArray(solutionObj){
      if(solutionObj == null) return [];

      if(Array.isArray(solutionObj)){
        return solutionObj.map(v => String(v));
      }

      const text = String(solutionObj).trim();

      if(text.startsWith('[') && text.endsWith(']')){
        return text.slice(1, -1).split(',').map(v => v.trim()).filter(Boolean);
      }

      return [text];
    }

    function compareNumbers(l, r, relation){
      if(relation === '=') return l === r;
      if(relation === '>') return l > r;
      if(relation === '<') return l < r;
      if(relation === '>=') return l >= r;
      if(relation === '<=') return l <= r;
      return false;
    }

    function solveNoVariable(left, right, relation){
      try{
        const lText = nerdamer(left).evaluate().text();
        const rText = nerdamer(right).evaluate().text();
        const lNum = Number(lText);
        const rNum = Number(rText);

        if(Number.isFinite(lNum) && Number.isFinite(rNum)){
          addMessage(compareNumbers(lNum, rNum, relation) ? '참이야.' : '거짓이야.', !compareNumbers(lNum, rNum, relation));
          addLatexResult(`\\text{왼쪽} = ${nerdamer.convertToLaTeX(lText)}`);
          addLatexResult(`\\text{오른쪽} = ${nerdamer.convertToLaTeX(rText)}`);
          return true;
        }
      } catch {}
      return false;
    }

    function solveSingleEquationOneVar(left, right, variable){
      try{
        if(left === variable){
          addExactApproxResult(variable, right);
          return true;
        }
        if(right === variable){
          addExactApproxResult(variable, left);
          return true;
        }
      } catch {}

      try{
        const solved = nerdamer.solve(`(${left})-(${right})`, variable);
        const arr = getSolutionsStringArray(solved).map(v => v.trim()).filter(Boolean);
        const unique = [...new Set(arr)];
        if(unique.length){
          unique.forEach(sol => addExactApproxResult(variable, sol));
          return true;
        }
      } catch {}

      try{
        const solved = nerdamer.solveEquations([`${left}=${right}`]);
        if(Array.isArray(solved) && solved.length){
          for(const pair of solved){
            if(Array.isArray(pair) && pair.length === 2 && pair[0] === variable){
              addExactApproxResult(variable, pair[1]);
              return true;
            }
          }
        }
      } catch {}

      return false;
    }

    function solveSystem(equations){
      try{
        const solved = nerdamer.solveEquations(equations.map(e => `${e.left}=${e.right}`));
        if(Array.isArray(solved) && solved.length){
          for(const pair of solved){
            if(Array.isArray(pair) && pair.length === 2){
              addExactApproxResult(pair[0], pair[1]);
            }
          }
          return true;
        }
      } catch {}
      return false;
    }

    function solveSimpleLinearInequality(left, right, relation, variable){
      try{
        const diff = nerdamer(`expand((${left})-(${right}))`).toString();
        const aExpr = nerdamer(`diff(${diff}, ${variable})`).toString();
        const bExpr = nerdamer(diff).sub(variable, 0).toString();

        const aNum = Number(nerdamer(aExpr).evaluate().text());
        if(!Number.isFinite(aNum) || aNum === 0) return false;

        let boundaryExpr = `(-(${bExpr}))/(${aExpr})`;
        boundaryExpr = nerdamer(boundaryExpr).toString();

        let rel = relation;
        if(aNum < 0){
          if(rel === '>') rel = '<';
          else if(rel === '<') rel = '>';
          else if(rel === '>=') rel = '<=';
          else if(rel === '<=') rel = '>=';
        }

        let exactRelLatex = '';
        if(rel === '>') exactRelLatex = `${variable} > ${nerdamer.convertToLaTeX(boundaryExpr)}`;
        if(rel === '<') exactRelLatex = `${variable} < ${nerdamer.convertToLaTeX(boundaryExpr)}`;
        if(rel === '>=') exactRelLatex = `${variable} \\ge ${nerdamer.convertToLaTeX(boundaryExpr)}`;
        if(rel === '<=') exactRelLatex = `${variable} \\le ${nerdamer.convertToLaTeX(boundaryExpr)}`;

        addLatexResult(exactRelLatex);

        const approx = formatApprox(boundaryExpr);
        if(approx !== null){
          let approxRelLatex = '';
          if(rel === '>') approxRelLatex = `\\text{근사값}\\; ${variable} > ${approx}`;
          if(rel === '<') approxRelLatex = `\\text{근사값}\\; ${variable} < ${approx}`;
          if(rel === '>=') approxRelLatex = `\\text{근사값}\\; ${variable} \\ge ${approx}`;
          if(rel === '<=') approxRelLatex = `\\text{근사값}\\; ${variable} \\le ${approx}`;
          addLatexResult(approxRelLatex);
        }

        return true;
      } catch {}
      return false;
    }

    function solveAll(){
      showWarning('');
      clearResults();
      closeAllRelationMenus();

      const equations = getEquationObjects();

      if(!equations.length){
        addMessage('식을 먼저 입력해줘.', true);
        return;
      }

      for(const eq of equations){
        if(!eq.leftDisplay || !eq.rightDisplay){
          addMessage('각 줄마다 왼쪽 식과 오른쪽 식을 둘 다 입력해줘.', true);
          return;
        }
      }

      const hasIneq = equations.some(e => e.relation !== '=');
      const allText = equations.map(e => `${e.left}${e.relation}${e.right}`).join(' ');
      const variables = detectVariablesFromText(allText);

      if(hasIneq){
        if(equations.length !== 1){
          addMessage('해를 찾지 못했어.', true);
          return;
        }
        const eq = equations[0];

        if(variables.length === 0){
          if(!solveNoVariable(eq.left, eq.right, eq.relation)){
            addMessage('해를 찾지 못했어.', true);
          }
          return;
        }

        if(variables.length === 1){
          if(!solveSimpleLinearInequality(eq.left, eq.right, eq.relation, variables[0])){
            addMessage('해를 찾지 못했어.', true);
          }
          return;
        }

        addMessage('해를 찾지 못했어.', true);
        return;
      }

      if(variables.length === 0){
        if(equations.length === 1 && solveNoVariable(equations[0].left, equations[0].right, '=')){
          return;
        }
        addMessage('해를 찾지 못했어.', true);
        return;
      }

      if(equations.length === 1 && variables.length === 1){
        if(!solveSingleEquationOneVar(equations[0].left, equations[0].right, variables[0])){
          addMessage('해를 찾지 못했어.', true);
        }
        return;
      }

      if(equations.length >= 2){
        if(!solveSystem(equations)){
          addMessage('해를 찾지 못했어.', true);
        }
        return;
      }

      addMessage('해를 찾지 못했어.', true);
    }

    addEqBtn.addEventListener('click', () => createEquationRow());
    solveBtn.addEventListener('click', solveAll);

    clearBtn.addEventListener('click', () => {
      equationList.innerHTML = '';
      clearResults();
      addMessage('아직 계산하지 않았어.');
      createEquationRow('', '', '=');
      createEquationRow('', '', '=');
      showWarning('');
      updateAnalysis();
    });

    document.addEventListener('click', (e) => {
      if(!e.target.closest('.relation-btn') && !e.target.closest('.relation-menu')){
        closeAllRelationMenus();
      }
    });

    createEquationRow('', '', '=');
    createEquationRow('', '', '=');
    updateAnalysis();
  </script>
</body>
</html>
