<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>방정식 계산 사이트</title>

  <!-- KaTeX: 수학 표시 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

  <!-- Nerdamer: 방정식 풀이 -->
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/nerdamer.core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Algebra.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Calculus.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Solve.js"></script>

  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#1e293b;
      --panel:#111827cc;
      --line:#334155;
      --text:#e5eefc;
      --sub:#9fb0cc;
      --accent:#60a5fa;
      --accent2:#22c55e;
      --danger:#f87171;
      --shadow:0 20px 60px rgba(0,0,0,.35);
      --radius:24px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #1d4ed8 0%, transparent 28%),
        radial-gradient(circle at top right, #0ea5e9 0%, transparent 24%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .wrap{
      width:min(980px, 100%);
      background:var(--panel);
      backdrop-filter: blur(14px);
      border:1px solid rgba(255,255,255,.09);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px;
    }

    .title{
      font-size:clamp(28px, 4vw, 40px);
      font-weight:800;
      margin:0 0 8px;
      letter-spacing:-0.02em;
    }

    .desc{
      color:var(--sub);
      font-size:15px;
      line-height:1.6;
      margin-bottom:22px;
    }

    .eq-box{
      background:rgba(15,23,42,.72);
      border:1px solid var(--line);
      border-radius:22px;
      padding:20px;
      margin-bottom:18px;
    }

    .row{
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      gap:14px;
      align-items:center;
    }

    .eq-sign{
      font-size:42px;
      font-weight:900;
      color:#dbeafe;
      padding:0 8px;
      user-select:none;
    }

    .field{
      width:100%;
      min-height:68px;
      border-radius:18px;
      border:1px solid #3b4a64;
      background:#0b1220;
      color:var(--text);
      padding:16px 18px;
      font-size:24px;
      font-weight:700;
      outline:none;
      transition:.18s ease;
    }

    .field:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(96,165,250,.14);
    }

    .field::placeholder{
      color:#7f8da5;
      font-weight:600;
    }

    .preview-card{
      margin-top:18px;
      background:rgba(2,8,23,.65);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
    }

    .preview-label{
      color:var(--sub);
      font-size:14px;
      margin-bottom:10px;
      font-weight:700;
    }

    .preview{
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      overflow:auto hidden;
      padding:8px;
      font-size:28px;
    }

    .actions{
      margin-top:18px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      cursor:pointer;
      border-radius:16px;
      padding:15px 22px;
      font-size:18px;
      font-weight:800;
      transition:.18s ease;
    }

    .solve-btn{
      background:linear-gradient(135deg, var(--accent), #2563eb);
      color:white;
      box-shadow:0 12px 30px rgba(37,99,235,.28);
    }

    .solve-btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.05);
    }

    .clear-btn{
      background:#1f2937;
      color:#e5e7eb;
      border:1px solid #3b4455;
    }

    .clear-btn:hover{
      transform:translateY(-1px);
      background:#273244;
    }

    .hint{
      margin-top:16px;
      color:var(--sub);
      line-height:1.7;
      font-size:14px;
      background:rgba(15,23,42,.42);
      border:1px solid rgba(148,163,184,.18);
      border-radius:16px;
      padding:14px 16px;
    }

    .result{
      margin-top:18px;
      background:rgba(2,8,23,.72);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
    }

    .result h2{
      margin:0 0 12px;
      font-size:20px;
    }

    .result-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .result-item{
      background:#0b1220;
      border:1px solid #334155;
      border-radius:16px;
      padding:14px 16px;
      overflow:auto hidden;
    }

    .msg{
      font-size:16px;
      line-height:1.6;
      color:#e2e8f0;
    }

    .msg.error{
      color:#fecaca;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(34,197,94,.12);
      border:1px solid rgba(34,197,94,.25);
      color:#bbf7d0;
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
    }

    .warning{
      margin-top:10px;
      color:#fecaca;
      font-size:13px;
      min-height:20px;
      font-weight:700;
    }

    .footer-note{
      margin-top:14px;
      color:#94a3b8;
      font-size:13px;
      line-height:1.6;
    }

    @media (max-width: 720px){
      .wrap{padding:18px}
      .row{
        grid-template-columns:1fr;
      }
      .eq-sign{
        text-align:center;
        padding:2px 0;
        font-size:34px;
      }
      .field{
        min-height:60px;
        font-size:21px;
      }
      .preview{
        font-size:22px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">방정식 계산 사이트</h1>
    <div class="desc">
      왼쪽 식과 오른쪽 식을 입력한 뒤 <b>해 찾기</b>를 누르면 해를 계산해줘.<br>
      한글은 입력할 수 없고, 루트는 <b>^1/2</b> 방식으로 입력하면 돼.
    </div>

    <div class="eq-box">
      <div class="row">
        <input id="leftExpr" class="field" type="text" inputmode="text" autocomplete="off" spellcheck="false" placeholder="왼쪽 식 입력">
        <div class="eq-sign">=</div>
        <input id="rightExpr" class="field" type="text" inputmode="text" autocomplete="off" spellcheck="false" placeholder="오른쪽 식 입력">
      </div>

      <div class="preview-card">
        <div class="preview-label">미리보기</div>
        <div id="preview" class="preview">□ = □</div>
      </div>

      <div class="actions">
        <button id="solveBtn" class="solve-btn">해 찾기</button>
        <button id="clearBtn" class="clear-btn">지우기</button>
      </div>

      <div id="warning" class="warning"></div>

      <div class="hint">
        입력 예시:<br>
        • <b>x^2=9</b><br>
        • <b>(x+1)^2=16</b><br>
        • <b>x^1/2=3</b><br>
        • <b>2*x+3=11</b><br>
        • 곱셈은 <b>*</b>, 나눗셈은 <b>/</b>, 거듭제곱은 <b>^</b> 로 입력
      </div>
    </div>

    <div class="result">
      <div class="chip">결과</div>
      <h2>해</h2>
      <div id="resultList" class="result-list">
        <div class="msg">아직 계산하지 않았어.</div>
      </div>
      <div class="footer-note">
        브라우저 한 파일 버전이라서 대부분의 단일 변수 방정식은 잘 풀리지만,
        모든 고급 방정식을 100% 완벽하게 처리하는 건 한계가 있을 수 있어.
      </div>
    </div>
  </div>

  <script>
    const leftExpr = document.getElementById('leftExpr');
    const rightExpr = document.getElementById('rightExpr');
    const preview = document.getElementById('preview');
    const resultList = document.getElementById('resultList');
    const solveBtn = document.getElementById('solveBtn');
    const clearBtn = document.getElementById('clearBtn');
    const warning = document.getElementById('warning');

    const HANGUL_REGEX = /[ㄱ-ㅎㅏ-ㅣ가-힣]/g;
    const ALLOWED_REGEX = /[^0-9a-zA-Z+\-*/^().,_ ]/g;

    function sanitizeInput(value) {
      let v = value.replace(HANGUL_REGEX, '');
      v = v.replace(ALLOWED_REGEX, '');
      return v;
    }

    function showWarning(text = '') {
      warning.textContent = text;
    }

    function normalizeExpr(expr) {
      let s = expr.trim();

      // 보기용 공백 정리
      s = s.replace(/\s+/g, '');

      // 유니코드 수학기호를 일반 연산자로 바꾸기
      s = s.replace(/×/g, '*').replace(/÷/g, '/');

      // 루트 기호 입력했을 때도 대응
      s = s.replace(/√\(([^()]+)\)/g, '($1)^(1/2)');
      s = s.replace(/√([a-zA-Z0-9.]+)/g, '($1)^(1/2)');

      return s;
    }

    function detectVariables(expr) {
      const raw = expr.match(/[a-zA-Z]+/g) || [];
      const banned = new Set(['e', 'pi']);
      const vars = [...new Set(raw.filter(v => !banned.has(v.toLowerCase())))];
      return vars;
    }

    function sideToLatex(expr) {
      const cleaned = normalizeExpr(expr);
      if (!cleaned) return '\\square';

      try {
        return nerdamer.convertToLaTeX(cleaned);
      } catch (e) {
        // fallback 텍스트
        return cleaned
          .replace(/\\/g, '\\textbackslash ')
          .replace(/\{/g, '\\{')
          .replace(/\}/g, '\\}');
      }
    }

    function renderEquationPreview() {
      const left = leftExpr.value.trim();
      const right = rightExpr.value.trim();

      const leftLatex = sideToLatex(left);
      const rightLatex = sideToLatex(right);

      const latex = `${leftLatex} = ${rightLatex}`;

      try {
        katex.render(latex, preview, {
          throwOnError: false,
          displayMode: true,
          trust: true
        });
      } catch (e) {
        preview.textContent = `${left || '□'} = ${right || '□'}`;
      }
    }

    function renderLatexInto(el, latex) {
      try {
        katex.render(latex, el, {
          throwOnError: false,
          displayMode: true,
          trust: true
        });
      } catch (e) {
        el.textContent = latex;
      }
    }

    function addMessage(text, isError = false) {
      const div = document.createElement('div');
      div.className = 'msg' + (isError ? ' error' : '');
      div.textContent = text;
      resultList.appendChild(div);
    }

    function addLatexResult(latex) {
      const item = document.createElement('div');
      item.className = 'result-item';
      renderLatexInto(item, latex);
      resultList.appendChild(item);
    }

    function clearResults() {
      resultList.innerHTML = '';
    }

    function getSolutionsStringArray(solutionObj) {
      if (solutionObj == null) return [];

      if (Array.isArray(solutionObj)) {
        return solutionObj.map(v => String(v));
      }

      const text = String(solutionObj).trim();

      // [a,b,c] 형태
      if (text.startsWith('[') && text.endsWith(']')) {
        return text
          .slice(1, -1)
          .split(',')
          .map(v => v.trim())
          .filter(Boolean);
      }

      // 단일 해
      return [text];
    }

    function solveEquation() {
      showWarning('');
      clearResults();

      const leftRaw = sanitizeInput(leftExpr.value);
      const rightRaw = sanitizeInput(rightExpr.value);

      leftExpr.value = leftRaw;
      rightExpr.value = rightRaw;
      renderEquationPreview();

      const left = normalizeExpr(leftRaw);
      const right = normalizeExpr(rightRaw);

      if (!left || !right) {
        addMessage('왼쪽 식과 오른쪽 식을 둘 다 입력해줘.', true);
        return;
      }

      const variables = detectVariables(left + ' ' + right);

      if (variables.length === 0) {
        try {
          const l = nerdamer(left).evaluate().text();
          const r = nerdamer(right).evaluate().text();
          if (l === r) {
            addMessage('미지수가 없고, 두 식이 서로 같아. 항상 참이야.');
          } else {
            addMessage('미지수가 없고, 두 식이 서로 달라. 해가 없어.', true);
          }
        } catch (e) {
          addMessage('식을 계산할 수 없어. 입력을 다시 확인해줘.', true);
        }
        return;
      }

      if (variables.length > 1) {
        addMessage('현재 이 한 줄 버전은 미지수가 1개인 방정식 풀이에 가장 잘 맞춰져 있어.', true);
        addMessage(`감지된 미지수: ${variables.join(', ')}`, true);
        return;
      }

      const variable = variables[0];
      const equationExpr = `(${left})-(${right})`;

      try {
        const solved = nerdamer.solve(equationExpr, variable);
        const arr = getSolutionsStringArray(solved);

        if (!arr.length || (arr.length === 1 && !arr[0])) {
          addMessage('해를 찾지 못했어. 식 형태를 다시 확인해줘.', true);
          return;
        }

        addMessage(`미지수: ${variable}`);
        addMessage(`찾은 해 개수: ${arr.length}`);

        const unique = [...new Set(arr.map(v => v.trim()))];

        unique.forEach((sol, i) => {
          let latex;
          try {
            latex = `${variable} = ${nerdamer.convertToLaTeX(sol)}`;
          } catch (e) {
            latex = `${variable} = ${sol}`;
          }
          addLatexResult(latex);
        });

      } catch (e) {
        // 1차 방정식 시스템 스타일 fallback
        try {
          const eqResult = nerdamer.solveEquations(`${left}=${right}`);
          if (Array.isArray(eqResult) && eqResult.length) {
            addMessage('해를 찾았어.');

            eqResult.forEach(pair => {
              if (Array.isArray(pair) && pair.length === 2) {
                const [name, value] = pair;
                let latex;
                try {
                  latex = `${name} = ${nerdamer.convertToLaTeX(String(value))}`;
                } catch {
                  latex = `${name} = ${value}`;
                }
                addLatexResult(latex);
              }
            });
            return;
          }

          addMessage('해를 찾지 못했어. 입력식을 다시 확인해줘.', true);
        } catch (e2) {
          addMessage('이 식은 현재 브라우저 한 파일 버전에서 풀 수 없거나 입력 형식이 맞지 않아.', true);
          addMessage('예: x^2=9, 2*x+3=11, (x+1)^2=16 같은 식으로 입력해줘.', true);
        }
      }
    }

    function handleInput(e) {
      const before = e.target.value;
      const after = sanitizeInput(before);

      if (before !== after) {
        e.target.value = after;
        showWarning('한글과 허용되지 않은 문자는 자동으로 제거됐어.');
      } else {
        showWarning('');
      }
      renderEquationPreview();
    }

    [leftExpr, rightExpr].forEach(input => {
      input.addEventListener('input', handleInput);

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text');
        const sanitized = sanitizeInput(pasted);
        const start = input.selectionStart ?? input.value.length;
        const end = input.selectionEnd ?? input.value.length;
        input.value = input.value.slice(0, start) + sanitized + input.value.slice(end);
        input.dispatchEvent(new Event('input'));
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          solveEquation();
        }
      });
    });

    solveBtn.addEventListener('click', solveEquation);

    clearBtn.addEventListener('click', () => {
      leftExpr.value = '';
      rightExpr.value = '';
      showWarning('');
      clearResults();
      addMessage('아직 계산하지 않았어.');
      renderEquationPreview();
      leftExpr.focus();
    });

    window.addEventListener('load', () => {
      renderEquationPreview();
    });
  </script>
</body>
</html>
